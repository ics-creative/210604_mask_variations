<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Canvasのマスク</title>
    <link rel="stylesheet" href="./styles/demo.css" />
  </head>
  <body class="demo-page demo-page--full">
    <div class="canvas-demo canvas-demo--full">
      <canvas id="canvas"></canvas>
      <h2 class="canvas-demo__hint">マウスをホバーしてください</h2>
    </div>
    <script type="module">
      const canvas = document.querySelector("#canvas");
      const ctx = canvas.getContext("2d");
      const img = new Image();
      img.src = "https://picsum.photos/800/600";

      const position = {
        x: window.innerWidth / 2,
        y: window.innerHeight / 2,
      };
      const maskRadius = 100;

      const resizeCanvas = () => {
        const dpr = window.devicePixelRatio;
        const width = window.innerWidth;
        const height = window.innerHeight;

        canvas.width = width * dpr;
        canvas.height = height * dpr;
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        draw();
      };

      const drawCircle = () => {
        ctx.beginPath();
        ctx.arc(position.x, position.y, maskRadius, 0, 2 * Math.PI, false);
        ctx.fillStyle = "#000000";
        ctx.fill();
      };

      const draw = () => {
        if (!img.complete || img.naturalWidth === 0) {
          return;
        }

        const width = window.innerWidth;
        const height = window.innerHeight;

        ctx.clearRect(0, 0, width, height);
        ctx.globalCompositeOperation = "source-over";
        ctx.drawImage(img, 0, 0, width, height);
        ctx.globalCompositeOperation = "destination-in";
        drawCircle();
      };

      const tick = () => {
        draw();
        requestAnimationFrame(tick);
      };

      canvas.addEventListener("mousemove", (e) => {
        const rect = canvas.getBoundingClientRect();
        position.x = e.clientX - rect.left;
        position.y = e.clientY - rect.top;
      });

      window.addEventListener("resize", resizeCanvas);

      await img.decode();
      resizeCanvas();
      tick();
    </script>
  </body>
</html>
